<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sociolo-Bingo — Le jeu d'observation et de jugement social en terrasse. Observer et boire, boire pour observer, boire et cocher, boire.">
  <meta name="theme-color" content="#fff1bd">
  <title>Sociolo-Bingo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23d6ff32'/><path d='M18 50 50 15 82 50 50 85Z' fill='%23ff4fa3' stroke='%2316120f' stroke-width='8'/><circle cx='50' cy='50' r='16' fill='%2315a6ff' stroke='%2316120f' stroke-width='7'/></svg>">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <main class="home-container">
      <h1 class="ascii-title">Sociolo-Bing<span class="peek-o">o<span class="peeker" aria-hidden="true">👀</span></span></h1>
      <p class="ascii-sub">Le jeu du jugement social</p>

      <label for="player-name" class="sr-only">Ton prénom</label>
      <input type="text" id="player-name" placeholder="Ton prénom" maxlength="15" autocomplete="off" spellcheck="false">

      <button id="btn-create" class="btn btn-primary">Créer une partie</button>

      <div class="divider"><span>- ou rejoindre avec un code -</span></div>

      <div class="join-row">
        <label for="room-code" class="sr-only">Code de la partie</label>
        <input type="text" id="room-code" placeholder="CODE PARTIE OU GRILLE" maxlength="6" autocomplete="off" spellcheck="false">
        <button id="btn-join" class="btn btn-secondary">GO</button>
      </div>

      <div id="error-msg" class="error" role="alert"></div>

      <button id="btn-info" class="btn btn-link">Règles du jeu</button>
      <button id="btn-open-grid-editor" class="btn btn-link">Créer ta grille</button>
      <button id="btn-open-custom-grids" class="btn btn-link">Voir les grilles</button>
    </main>
    <a class="discord-link" href="https://discord.gg/Eux78934N" target="_blank" rel="noopener" aria-label="Rejoindre le Discord">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
    </a>
  </div>

  <!-- CUSTOM GRID LIST PANEL -->
  <div id="custom-grid-panel-backdrop" class="panel-backdrop"></div>
  <div id="custom-grid-panel" class="panel custom-grid-panel" role="dialog" aria-modal="true" aria-label="Grilles créées">
    <div class="panel-header">
      <h3>Grilles créées</h3>
      <button id="btn-refresh-custom-grids" class="btn-mini" type="button">↻</button>
      <button id="btn-close-custom-grids" class="btn-close" type="button">&times;</button>
    </div>
    <div id="custom-grids-list" class="custom-grids-list"></div>
  </div>

  <!-- CUSTOM GRID EDITOR -->
  <div id="screen-grid-editor" class="screen">
    <main class="editor-container">
      <div class="editor-topbar">
        <button id="btn-editor-back" class="btn-icon" type="button" aria-label="Retour">↩</button>
        <h1>Créer ta grille</h1>
      </div>

      <div id="editor-result" class="editor-result" hidden></div>

      <div class="editor-meta">
        <label>
          <span>Nom de la grille</span>
          <input type="text" id="grid-name" maxlength="48" placeholder="Paris terrasse">
        </label>
        <label>
          <span>Ça désigne quoi ?</span>
          <input type="text" id="grid-subject" maxlength="60" placeholder="ville, plage, gare, festival...">
        </label>
        <label class="editor-public-toggle">
          <input type="checkbox" id="grid-public" checked>
          <span>Visible dans les grilles créées</span>
        </label>
      </div>

      <div id="custom-grid-editor"></div>

      <button id="btn-save-custom-grid" class="btn btn-primary" type="button">Publier la grille</button>
    </main>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="room-info">
        <span class="room-code-display" id="display-code" title="Copier le code"></span>
        <button id="btn-joker" class="btn-icon btn-joker" type="button" title="Joker disponible" aria-label="Joker disponible">🃏 <span id="joker-count">0</span></button>
        <button id="btn-back-home" class="btn-icon" title="Nouvelle partie" aria-label="Nouvelle partie">↩</button>
        <button id="btn-share" class="btn-icon" aria-label="Partager la partie">&gt;share</button>
      </div>
      <button id="btn-players" class="btn-icon">&gt;joueurs <span id="player-count">0</span></button>
    </div>

    <div class="game-content">
      <div id="mode-banner" class="mode-banner" hidden>🔥 Mode hardcore — complète 2 grilles pour gagner</div>
      <div class="grid-section" id="section-ordinaire">
        <div class="section-header ordinaire">
          <h3>Ordinaire <span class="section-pct">60%</span></h3>
          <span class="progress"><span id="bonus-ordinaire" class="bonus-count"></span><span id="progress-ordinaire">0/12</span></span>
        </div>
        <div class="grid grid-4" id="grid-ordinaire"></div>
      </div>

      <div class="grid-section" id="section-semi">
        <div class="section-header semi">
          <h3>Semi-Ordinaire <span class="section-pct">30%</span></h3>
          <span class="progress"><span id="bonus-semi" class="bonus-count"></span><span id="progress-semi">0/6</span></span>
        </div>
        <div class="grid grid-3" id="grid-semi"></div>
      </div>

      <div class="grid-section" id="section-rare">
        <div class="section-header rare">
          <h3>Rare <span class="section-pct">10%</span></h3>
          <span class="progress"><span id="bonus-rare" class="bonus-count"></span><span id="progress-rare">0/2</span></span>
        </div>
        <div class="grid grid-2" id="grid-rare"></div>
      </div>

      <div class="grid-section" id="section-legendaire">
        <div class="section-header legendaire">
          <h3>Légendaire <span class="section-pct">victoire instantanée</span></h3>
          <span class="progress"><span id="bonus-legendaire" class="bonus-count"></span><span id="progress-legendaire">0/1</span></span>
        </div>
        <div class="grid grid-1" id="grid-legendaire"></div>
      </div>
    </div>
  </div>

  <!-- PLAYERS PANEL -->
  <div id="panel-backdrop" class="panel-backdrop"></div>
  <div id="players-panel" class="panel" role="dialog" aria-modal="true" aria-label="Liste des joueurs">
    <div class="panel-header">
      <h3>Joueurs</h3>
      <button id="btn-close-panel" class="btn-close">&times;</button>
    </div>
    <div id="players-list"></div>
    <button id="btn-new-game" class="btn btn-primary btn-new-game" style="display:none">Nouvelle partie</button>
  </div>

  <!-- WIN OVERLAY -->
  <div id="win-overlay" class="overlay" role="dialog" aria-modal="true" aria-label="Résultat de la partie">
    <div class="win-content">
      <div class="win-drawing" id="win-drawing"></div>
      <h2 id="win-title"></h2>
      <p id="win-detail"></p>
      <button id="btn-new-game-2" class="btn btn-primary">Nouvelle partie</button>
      <button id="btn-continue-hard" class="btn btn-secondary">Continuer en mode hardcore</button>
    </div>
  </div>

  <!-- BONUS CHOICE -->
  <div id="bonus-choice-overlay" class="overlay bonus-choice-overlay" role="dialog" aria-modal="true" aria-label="Choix de bonus">
    <div class="bonus-choice-content">
      <div id="bonus-choice-drawing" class="win-drawing"></div>
      <h2>Bonus débloqué</h2>
      <p id="bonus-choice-detail"></p>
      <button id="btn-bonus-freecheck" class="btn btn-primary">Cocher une case gratis</button>
      <button id="btn-bonus-reroll" class="btn btn-secondary">Rejouer 3 cases</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="bonus-flash" class="bonus-flash"></div>
  <div id="activity-notice" class="activity-notice" aria-live="polite" aria-atomic="true"></div>
  <div id="toast" class="toast"></div>

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token":"8b3d778dc56d468a83ea9822b1442662"}'></script>
  <!-- End Cloudflare Web Analytics -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
