<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocioloBingo - Sticker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="qr-body">
  <main class="qr-shell">
    <h1>SocioloBingo</h1>
    <p>Chargement du jeu...</p>
  </main>

  <script>
    (async () => {
      const source = 'sticker';
      const campaign = 'stickers_rennes';
      const now = new Date().toISOString();

      try {
        localStorage.setItem('source', source);
        localStorage.setItem('campaign', campaign);
        if (!localStorage.getItem('first_scan_at')) {
          localStorage.setItem('first_scan_at', now);
        }
      } catch {}

      const scanPayload = {
        timestamp: now,
        userAgent: navigator.userAgent || '',
        referrer: document.referrer || '',
        pathname: window.location.pathname || '/qr',
        source,
        campaign,
      };

      const fetchWithTimeout = (url, options = {}, timeoutMs = 3000) => Promise.race([
        fetch(url, options),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeoutMs)),
      ]);

      // Le scan est envoyé via sendBeacon : la livraison survit à la redirection
      // et n'a pas de timeout, donc le 1er scan qui réveille le serveur (cold
      // start Render, ~30-50 s) n'est plus perdu. Fallback fetch keepalive.
      const sent = (() => {
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob([JSON.stringify(scanPayload)], { type: 'application/json' });
            return navigator.sendBeacon('/api/qr-scan', blob);
          }
        } catch {}
        return false;
      })();
      if (!sent) {
        try {
          fetch('/api/qr-scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(scanPayload),
            keepalive: true,
          }).catch(() => {});
        } catch {}
      }

      let redirectTarget = '/';
      try {
        const config = await fetchWithTimeout('/api/qr-config');
        const data = await config.json();
        if (typeof data.redirectTarget === 'string' && data.redirectTarget.startsWith('/')) {
          redirectTarget = data.redirectTarget;
        }
      } catch {}

      window.location.replace(redirectTarget);
    })();
  </script>
</body>
</html>
