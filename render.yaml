services:
  - type: web
    name: bingo-social
    runtime: node
    plan: standard
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    domains:
      - sociolobingo.com
      - www.sociolobingo.com
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
