services:
  - type: keyvalue
    name: bingo-social-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: bingo-social
    runtime: node
    plan: standard
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    domains:
      - sociolobingo.com
      - www.sociolobingo.com
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: bingo-social-redis
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
